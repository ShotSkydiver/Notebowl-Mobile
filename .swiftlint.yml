whitelist_rules:
    #- colon
    - vertical_whitespace
    #- closure_parameter_position
    #- statement_position
included:
    - "Notebowl Mobile"
    - "NotebowlMobileUITests"
excluded:
    - Pods
    - "Notebowl Mobile/Support Files"
    - "Notebowl Mobile/Libraries"

custom_rules:
    debugging_logs:
        included: ".*\\.swift"
        name: "Printing to Log"
        regex: "([l]og\\.)"
        match_kinds: identifier
        message: "Logging print statements to the console should be removed"
        severity: warning

force_cast: warning
force_try: warning
empty_count: warning
file_length:
    - 1000
    - 4000
cyclomatic_complexity:
    - 10
    - 40
function_parameter_count:
    - 10
    - 20

reporter: "xcode"
